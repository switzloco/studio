name: Android → Play Store

on:
  push:
    tags:
      - 'v*'
    branches:
      # TEMPORARY: lets us trigger builds without tag pushes (tag pushes are
      # blocked in this CI sandbox). Remove once a green build is confirmed.
      - 'claude/capacitor-app-launch-plan-KQd0y'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          # Decode to an ABSOLUTE path. AGP's injected store.file is resolved
          # relative to the app module (android/app), so a relative path like
          # 'app/release.keystore' wrongly becomes android/app/app/release.keystore.
          KS="$RUNNER_TEMP/release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KS" 2>/dev/null || true
          if [ ! -s "$KS" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is empty or not valid base64. Store the output of: base64 -i your-release.keystore"
            exit 1
          fi
          # Fail fast with a clear message if the keystore/password/alias are
          # wrong, instead of a cryptic gradle error during bundleRelease.
          if ! keytool -list -keystore "$KS" -storepass "$ANDROID_STORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::Keystore could not be opened with ANDROID_STORE_PASSWORD / ANDROID_KEY_ALIAS. Verify those secrets and that ANDROID_KEYSTORE_BASE64 is the base64 of the correct .keystore."
            exit 1
          fi
          echo "RELEASE_KEYSTORE=$KS" >> "$GITHUB_ENV"
          echo "Keystore validated OK"

      - name: Build release AAB
        working-directory: android
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$RELEASE_KEYSTORE" \
            -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      # Always publish the signed AAB as a downloadable artifact. Google Play
      # requires the FIRST upload of a brand-new app to be done manually in the
      # Play Console, so grab this artifact for that initial upload.
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Push to the Play Store internal track. This only works once the app
      # listing exists in the Play Console (and the account is out of review),
      # so it is non-fatal for now — the build + artifact above still succeed.
      - name: Upload to Play Store (internal track)
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.cfofitness
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
