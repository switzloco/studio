name: iOS → TestFlight

on:
  push:
    tags:
      - 'v*'
    branches:
      # TEMPORARY: lets us trigger builds without tag pushes (tag pushes are
      # blocked in this CI sandbox). Remove once a green build is confirmed.
      - 'claude/capacitor-app-launch-plan-KQd0y'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Resolve Swift Package dependencies
        working-directory: ios/App
        # Capacitor 8 uses Swift Package Manager (no CocoaPods / no .xcworkspace).
        run: xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          # Allow codesign/xcodebuild to use the imported key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          # Surface the imported identities so a wrong cert type (Development vs
          # Distribution) is obvious in the log.
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP="$RUNNER_TEMP/profile.mobileprovision"
          printf '%s' "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP" 2>/dev/null || true
          if [ ! -s "$PP" ]; then
            echo "::error::IOS_PROVISIONING_PROFILE_BASE64 is empty or not valid base64. Store: base64 -i your_profile.mobileprovision"
            exit 1
          fi
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          # Read the profile's name so we can pin it on the App target + export.
          security cms -D -i "$PP" > "$RUNNER_TEMP/pp.plist"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/pp.plist")"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $PROFILE_NAME"

      - name: Prepare App Store Connect credentials
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID_RAW: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID_RAW: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Strip any stray whitespace/newlines that sneak into the secrets via
          # copy-paste — an embedded space/tab/newline word-splits later args.
          KEY_ID="$(printf '%s' "$ASC_KEY_ID_RAW" | tr -d '[:space:]')"
          ISSUER_ID="$(printf '%s' "$ASC_ISSUER_ID_RAW" | tr -d '[:space:]')"
          # Export cleaned values for all downstream steps.
          {
            echo "ASC_KEY_ID=$KEY_ID"
            echo "ASC_ISSUER_ID=$ISSUER_ID"
          } >> "$GITHUB_ENV"

          KEY_OUT="$RUNNER_TEMP/asc_key.p8"
          # The secret may hold EITHER a base64 blob of the .p8 OR the raw
          # PEM .p8 text itself. Handle both so setup mistakes don't break CI.
          if printf '%s' "$ASC_API_KEY_BASE64" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s\n' "$ASC_API_KEY_BASE64" > "$KEY_OUT"
          else
            printf '%s' "$ASC_API_KEY_BASE64" | base64 --decode > "$KEY_OUT" 2>/dev/null || true
          fi
          # Validate without printing the key material.
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_OUT"; then
            echo "::error::ASC_API_KEY_BASE64 did not decode to a valid .p8 (PEM) key. Store either the base64 of the AuthKey_XXX.p8 file, or paste the raw .p8 contents."
            exit 1
          fi
          # xcodebuild auth (archive/export) reads $KEY_OUT directly; altool
          # (upload) looks for AuthKey_<id>.p8 in this well-known directory.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEY_OUT" "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"
          echo "ASC API key staged OK"

      - name: Configure manual signing on the App target
        run: |
          set -euo pipefail
          PBX=ios/App/App.xcodeproj/project.pbxproj
          # App.xcodeproj contains ONLY the App target — the Capacitor SPM
          # package targets live in separate projects — so editing signing here
          # is safely scoped to the app and never touches the SPM targets that
          # reject provisioning profiles. Automatic signing in headless CI keeps
          # falling back to a *Development* profile (and tries to register the
          # runner as a device); manual signing with the installed App Store
          # profile is the reliable path.
          /usr/bin/sed -i '' \
            "s|CODE_SIGN_STYLE = Automatic;|CODE_SIGN_STYLE = Manual; DEVELOPMENT_TEAM = N7DBYV74D4; CODE_SIGN_IDENTITY = \"Apple Distribution\"; PROVISIONING_PROFILE_SPECIFIER = \"${PROFILE_NAME}\";|g" \
            "$PBX"
          echo "App target signing settings:"
          grep -n "PROVISIONING_PROFILE_SPECIFIER\|CODE_SIGN_IDENTITY\|CODE_SIGN_STYLE" "$PBX" || true

      - name: Build & archive
        working-directory: ios/App
        run: |
          # Manual signing — the App target build settings (patched above) point
          # at the installed App Store distribution profile.
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive

      - name: Export IPA
        working-directory: ios/App
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>N7DBYV74D4</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.cfofitness</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
