name: iOS → TestFlight

on:
  push:
    tags:
      - 'v*'
    branches:
      # TEMPORARY: lets us trigger builds without tag pushes (tag pushes are
      # blocked in this CI sandbox). Remove once a green build is confirmed.
      - 'claude/capacitor-app-launch-plan-KQd0y'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Resolve Swift Package dependencies
        working-directory: ios/App
        # Capacitor 8 uses Swift Package Manager (no CocoaPods / no .xcworkspace).
        run: xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          # Allow codesign/xcodebuild to use the imported key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Prepare App Store Connect credentials
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID_RAW: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID_RAW: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Strip any stray whitespace/newlines that sneak into the secrets via
          # copy-paste — an embedded space/tab/newline word-splits later args.
          KEY_ID="$(printf '%s' "$ASC_KEY_ID_RAW" | tr -d '[:space:]')"
          ISSUER_ID="$(printf '%s' "$ASC_ISSUER_ID_RAW" | tr -d '[:space:]')"
          # Export cleaned values for all downstream steps.
          {
            echo "ASC_KEY_ID=$KEY_ID"
            echo "ASC_ISSUER_ID=$ISSUER_ID"
          } >> "$GITHUB_ENV"

          KEY_OUT="$RUNNER_TEMP/asc_key.p8"
          # The secret may hold EITHER a base64 blob of the .p8 OR the raw
          # PEM .p8 text itself. Handle both so setup mistakes don't break CI.
          if printf '%s' "$ASC_API_KEY_BASE64" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s\n' "$ASC_API_KEY_BASE64" > "$KEY_OUT"
          else
            printf '%s' "$ASC_API_KEY_BASE64" | base64 --decode > "$KEY_OUT" 2>/dev/null || true
          fi
          # Validate without printing the key material.
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_OUT"; then
            echo "::error::ASC_API_KEY_BASE64 did not decode to a valid .p8 (PEM) key. Store either the base64 of the AuthKey_XXX.p8 file, or paste the raw .p8 contents."
            exit 1
          fi
          # xcodebuild auth (archive/export) reads $KEY_OUT directly; altool
          # (upload) looks for AuthKey_<id>.p8 in this well-known directory.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEY_OUT" "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"
          echo "ASC API key staged OK"

      - name: Build & archive
        working-directory: ios/App
        run: |
          # Automatic signing driven by the App Store Connect API key. Xcode
          # provisions the App target (creating/downloading a distribution
          # profile as needed) and leaves the SPM package targets — which do
          # NOT support provisioning profiles — untouched.
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/asc_key.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=N7DBYV74D4

      - name: Export IPA
        working-directory: ios/App
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>N7DBYV74D4</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/asc_key.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
